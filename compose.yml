services:
  transcriber:
    build: ./whisper
    environment:
      - TZ=${TZ}
    volumes:
      - ./.env:/whisper/.env:ro
      - ./whisper/logs:/whisper/logs
      - "models:/models"
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    gpus: all
    stop_signal: SIGINT
    stop_grace_period: 30s

  api:
    build: ./api
    environment:
      - TZ=${TZ}
    volumes:
      - ./.env:/node/.env:ro
      - ./api/logs:/node/logs
    ports:
    - "80:80"
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

  database:
    image: pgvector/pgvector:pg18
    environment:
      - TZ=${TZ}
      - PGTZ=${TZ}
    env_file: ".env"
    ports:
      - "5432:5432"
    volumes:
      - "pgdata:/var/lib/postgresql"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 7s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: postgres -c timezone=${TZ}

volumes:
  models:
  pgdata: